<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDIO ZAK — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --w:#fff; --b:#111; --m:#888; --l:#e8e8e8; --bg:#f7f7f5; --f:'DM Sans',sans-serif; }
body { font-family:var(--f); background:var(--bg); color:var(--b); font-size:13px; min-height:100vh; }

/* LOGIN */
#login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--w); border:1px solid var(--l); padding:48px 40px; width:340px; }
.login-box h1 { font-size:12px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:28px; }
.login-box input { width:100%; border:1px solid var(--l); padding:10px 12px; font-family:var(--f); font-size:13px; margin-bottom:10px; outline:none; }
.login-box input:focus { border-color:var(--b); }
.login-box .submit-btn { width:100%; background:var(--b); color:var(--w); border:none; padding:11px; font-family:var(--f); font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; }
.err { color:#c33; font-size:12px; margin-top:8px; display:none; }

/* ADMIN */
#admin-wrap { display:none; }
.top-bar { position:fixed; top:0; left:0; right:0; height:52px; background:var(--w); border-bottom:1px solid var(--l); display:flex; align-items:center; justify-content:space-between; padding:0 28px; z-index:100; }
.top-bar-logo { font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; }
.top-bar-right { display:flex; align-items:center; gap:10px; }
.deploy-msg { font-size:11px; color:var(--m); }
.btn { padding:7px 18px; font-family:var(--f); font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border:1px solid var(--l); background:var(--w); color:var(--b); }
.btn-dark { background:var(--b); color:var(--w); border-color:var(--b); }
.btn-sm { padding:5px 11px; font-size:10px; }
.btn-red { background:#fff0f0; color:#c33; border-color:#fcc; }
.btn:hover { opacity:0.7; }

.layout { margin-top:52px; display:grid; grid-template-columns:160px 1fr; min-height:calc(100vh - 52px); }
.sidebar { background:var(--w); border-right:1px solid var(--l); padding:20px 0; }
.nav-btn { display:block; width:100%; padding:9px 22px; font-size:11px; font-weight:400; letter-spacing:0.1em; text-transform:uppercase; color:var(--m); border:none; background:none; cursor:pointer; text-align:left; transition:all 0.2s; }
.nav-btn.on, .nav-btn:hover { color:var(--b); background:var(--bg); }

.content { padding:36px 44px; max-width:860px; }
.sec-title { font-size:10px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:var(--m); margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid var(--l); }
.tab { display:none; }
.tab.on { display:block; }

.field { margin-bottom:18px; }
.field label { display:block; font-size:10px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; color:var(--m); margin-bottom:5px; }
.field input, .field textarea, .field select { width:100%; border:1px solid var(--l); padding:9px 11px; font-family:var(--f); font-size:13px; outline:none; background:var(--w); }
.field input:focus, .field textarea:focus { border-color:var(--b); }
.field textarea { min-height:76px; resize:vertical; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.proj-list { display:flex; flex-direction:column; gap:2px; margin-bottom:20px; }
.proj-card { background:var(--w); border:1px solid var(--l); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
.proj-card-name { font-size:13px; font-weight:500; margin-bottom:2px; }
.proj-card-sub { font-size:11px; color:var(--m); }
.add-btn { width:100%; border:1px dashed var(--l); padding:13px; text-align:center; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--m); background:none; cursor:pointer; }
.add-btn:hover { border-color:var(--b); color:var(--b); }

.editor { background:var(--w); border:1px solid var(--l); padding:24px; margin-top:14px; display:none; }
.editor.on { display:block; }
.editor-title { font-size:10px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; color:var(--m); margin-bottom:18px; }
.editor-footer { display:flex; gap:8px; margin-top:10px; }

.gh-box { background:var(--w); border:1px solid var(--l); padding:24px; margin-bottom:20px; }
.gh-box p { font-size:13px; color:var(--m); line-height:1.7; margin-bottom:14px; }
.gh-box a { color:var(--b); text-decoration:underline; }
.gh-status { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:14px; padding:10px 12px; background:var(--bg); }
.dot { width:7px; height:7px; border-radius:50%; background:var(--l); flex-shrink:0; }
.dot.green { background:#2a9; }
.dot.red { background:#c33; }

.toast { position:fixed; bottom:22px; right:22px; background:var(--b); color:var(--w); padding:11px 18px; font-size:12px; opacity:0; transition:opacity 0.3s; z-index:999; pointer-events:none; }
.toast.on { opacity:1; }
.toast.red { background:#c33; }

.upload-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.upload-hint { font-size:11px; color:var(--m); margin-top:4px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <div class="login-box">
    <h1>Studio Zak — Admin</h1>
    <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="submit-btn" onclick="doLogin()">Enter</button>
    <div class="err" id="login-err">비밀번호가 틀렸어요</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-wrap">
  <div class="top-bar">
    <span class="top-bar-logo">Studio Zak — Admin</span>
    <div class="top-bar-right">
      <span class="deploy-msg" id="deploy-msg"></span>
      <button class="btn btn-dark" onclick="deploy()">Save & Deploy</button>
      <button class="btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <button class="nav-btn on" onclick="showTab('projects',this)">Projects</button>
      <button class="nav-btn" onclick="showTab('about',this)">About</button>
      <button class="nav-btn" onclick="showTab('contact',this)">Contact</button>
      <button class="nav-btn" onclick="showTab('settings',this)">Settings</button>
    </div>

    <div class="content">

      <!-- PROJECTS TAB -->
      <div id="tab-projects" class="tab on">
        <div class="sec-title">Projects</div>
        <div class="proj-list" id="proj-list"></div>
        <button class="add-btn" onclick="newProject()">+ Add Project</button>
        <div class="editor" id="editor">
          <div class="editor-title" id="editor-title">Edit Project</div>
          <div class="row2">
            <div class="field"><label>Name</label><input id="f-name" type="text"></div>
            <div class="field"><label>Type</label>
              <select id="f-type">
                <option value="interior">Interior</option>
                <option value="furniture">Furniture</option>
              </select>
            </div>
          </div>
          <div class="row2">
            <div class="field"><label>Category</label><input id="f-cat" type="text"></div>
            <div class="field"><label>Year</label><input id="f-year" type="text"></div>
          </div>
          <div class="field"><label>Size</label><input id="f-size" type="text"></div>
          <div class="field">
            <label>Images</label>
            <input type="file" id="f-file" accept="image/*" multiple style="display:none" onchange="uploadImgs(this)">
            <div class="upload-row">
              <button class="btn btn-sm" type="button" onclick="document.getElementById('f-file').click()">📁 이미지 업로드</button>
              <span id="upload-msg" style="font-size:11px;color:var(--m);"></span>
            </div>
            <textarea id="f-images" placeholder="업로드하거나 URL 직접 입력 (한 줄에 하나씩)"></textarea>
            <div class="upload-hint">여러 장 선택 가능 · 업로드하면 URL 자동 입력</div>
          </div>
          <div class="editor-footer">
            <button class="btn btn-dark btn-sm" onclick="saveProj()">Save</button>
            <button class="btn btn-sm" onclick="closeEditor()">Cancel</button>
            <button class="btn btn-red btn-sm" id="del-btn" onclick="delProj()" style="margin-left:auto;">Delete</button>
          </div>
        </div>
      </div>

      <!-- ABOUT TAB -->
      <div id="tab-about" class="tab">
        <div class="sec-title">About Text</div>
        <div class="field"><label>Paragraph 1</label><textarea id="a-p1" style="min-height:90px;"></textarea></div>
        <div class="field"><label>Paragraph 2</label><textarea id="a-p2" style="min-height:90px;"></textarea></div>
        <div class="field"><label>Paragraph 3</label><textarea id="a-p3" style="min-height:90px;"></textarea></div>
      </div>

      <!-- CONTACT TAB -->
      <div id="tab-contact" class="tab">
        <div class="sec-title">Contact</div>
        <div class="field"><label>Studio / Location</label><input id="c-studio" type="text"></div>
        <div class="field"><label>Email</label><input id="c-email" type="text"></div>
        <div class="field"><label>Phone</label><input id="c-phone" type="text"></div>
        <div class="field"><label>Instagram</label><input id="c-ig" type="text"></div>
        <div class="field"><label>New Business</label><input id="c-biz" type="text"></div>
      </div>

      <!-- SETTINGS TAB -->
      <div id="tab-settings" class="tab">
        <div class="sec-title">GitHub Settings</div>
        <div class="gh-box">
          <p>GitHub Personal Access Token을 입력하면 Save & Deploy로 사이트가 자동 업데이트돼요.<br>
          토큰 발급: <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a> → <strong>repo</strong> 체크 → Generate</p>
          <div class="field"><label>GitHub Token</label><input type="password" id="s-token" placeholder="ghp_xxxxxxxxxxxx"></div>
          <div class="field"><label>GitHub Owner (아이디)</label><input type="text" id="s-owner" placeholder="byeolingzchoi"></div>
          <div class="field"><label>Repository Name</label><input type="text" id="s-repo" placeholder="STUDIO-ZAK"></div>
          <div class="field"><label>File Path</label><input type="text" id="s-path" placeholder="index.html" value="index.html"></div>
          <button class="btn btn-dark btn-sm" onclick="saveGH()">Save Settings</button>
          <div class="gh-status">
            <div class="dot" id="gh-dot"></div>
            <span id="gh-txt">설정을 저장하면 연결 상태가 표시돼요</span>
          </div>
        </div>
        <div class="gh-box">
          <p><strong style="color:var(--b);">비밀번호 변경</strong></p>
          <div class="field" style="margin-top:12px;"><label>New Password</label><input type="password" id="s-pw" placeholder="새 비밀번호"></div>
          <button class="btn btn-sm" onclick="changePW()">Change Password</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 기본 비밀번호 ── //
const DEFAULT_PW = 'studiozak2024';

// ── 상태 ── //
let projects = [];
let about = { p1:'', p2:'', p3:'' };
let contact = { studio:'Seoul, Korea', email:'—', phone:'—', ig:'@studiozak', biz:'—' };
let gh = { token:'', owner:'', repo:'', path:'index.html' };
let editIdx = -1;

// ── 로그인 ── //
function doLogin() {
  const pw = document.getElementById('pw').value;
  const saved = localStorage.getItem('zak_pw') || DEFAULT_PW;
  if (pw === saved) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('pw').value = '';
  document.getElementById('login-err').style.display = 'none';
}

function changePW() {
  const np = document.getElementById('s-pw').value.trim();
  if (!np) { toast('비밀번호를 입력하세요', true); return; }
  localStorage.setItem('zak_pw', np);
  document.getElementById('s-pw').value = '';
  toast('비밀번호 변경 완료!');
}

// ── 데이터 로드 ── //
async function loadAll() {
  // gh 설정은 localStorage에서 (이건 브라우저별로 저장해도 됨)
  const sg = localStorage.getItem('zak_g');
  gh = sg ? JSON.parse(sg) : {token:'', owner:'', repo:'', path:'index.html'};

  renderGH();

  // GitHub에서 최신 index.html 읽어서 데이터 파싱
  if (gh.token && gh.owner && gh.repo) {
    const msg = document.getElementById('deploy-msg');
    msg.textContent = '데이터 불러오는 중...';
    try {
      const url = `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.path}`;
      const res = await fetch(url, {
        headers: {
          'Authorization': `token ${gh.token}`,
          'Accept': 'application/vnd.github.v3+json',
        }
      });
      if (res.ok) {
        const json = await res.json();
        const raw = decodeURIComponent(escape(atob(json.content.replace(/\s/g,''))));

        // PROJECTS 파싱
        const projMatch = raw.match(/const PROJECTS = (\[[\s\S]*?\]);/);
        if (projMatch) {
          try { projects = JSON.parse(projMatch[1]); } catch(e) { projects = defaultProjects(); }
        } else { projects = defaultProjects(); }

        // about 파싱
        const p1 = raw.match(/<div class="home-body">[\s\S]*?<p>([\s\S]*?)<\/p>/);
        const p2 = raw.match(/<div class="home-body">[\s\S]*?<p>[\s\S]*?<\/p>[\s\S]*?<p>([\s\S]*?)<\/p>/);
        const p3 = raw.match(/<div class="home-body">[\s\S]*?<p>[\s\S]*?<\/p>[\s\S]*?<p>[\s\S]*?<\/p>[\s\S]*?<p>([\s\S]*?)<\/p>/);
        about = {
          p1: p1 ? p1[1].trim() : '',
          p2: p2 ? p2[1].trim() : '',
          p3: p3 ? p3[1].trim() : '',
        };

        // contact 파싱
        const studio = raw.match(/<span class="c-label">Studio<\/span><span class="c-val">([^<]*)<\/span>/);
        const email  = raw.match(/<span class="c-label">Email<\/span><span class="c-val">([^<]*)<\/span>/);
        const phone  = raw.match(/<span class="c-label">Phone<\/span><span class="c-val">([^<]*)<\/span>/);
        const biz    = raw.match(/<span class="c-label">New Business<\/span><span class="c-val">([^<]*)<\/span>/);
        const ig     = raw.match(/instagram\.com\/([^"]+)"/);
        contact = {
          studio: studio ? studio[1] : 'Seoul, Korea',
          email:  email  ? email[1]  : '—',
          phone:  phone  ? phone[1]  : '—',
          ig:     ig     ? '@' + ig[1] : '@studiozak.seoul',
          biz:    biz    ? biz[1]    : '—',
        };

        msg.textContent = '✓ GitHub에서 불러옴';
        setTimeout(() => { msg.textContent = ''; }, 2000);
      } else {
        throw new Error('fetch 실패');
      }
    } catch(e) {
      document.getElementById('deploy-msg').textContent = '';
      // GitHub 실패 시 localStorage 폴백
      loadFromLocalStorage();
    }
  } else {
    // GitHub 미설정 시 localStorage 폴백
    loadFromLocalStorage();
  }

  renderProjects();
  renderAbout();
  renderContact();
}

function loadFromLocalStorage() {
  const sp = localStorage.getItem('zak_p');
  projects = sp ? JSON.parse(sp) : defaultProjects();
  const sa = localStorage.getItem('zak_a');
  about = sa ? JSON.parse(sa) : {
    p1: 'Rooted in an architectural pursuit of excellence, we are a design studio that connects space, furniture, and installation through rigorous experimentation.',
    p2: 'We see space as something constantly transformed by those who inhabit it. By engaging with these organic shifts, we create environments that foster a broader, positive impact on society.',
    p3: 'Through new perspectives and material explorations, we strive to shape spaces that resonate with human perception and everyday life.',
  };
  const sc = localStorage.getItem('zak_c');
  contact = sc ? JSON.parse(sc) : {studio:'Seoul, Korea', email:'—', phone:'—', ig:'@studiozak.seoul', biz:'—'};
}

function defaultProjects() {
  return [
    {name:'3A4B', type:'furniture', cat:'Storage', size:'1180×490×1030mmH', year:'2023', images:['']},
    {name:'Unnamed Residence', type:'interior', cat:'Residential', size:'', year:'2024', images:['']},
    {name:'—', type:'furniture', cat:'Shelf', size:'', year:'2023', images:['']},
    {name:'—', type:'interior', cat:'Commercial', size:'', year:'2022', images:['']},
  ];
}

// ── TABS ── //
function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('tab-' + name).classList.add('on');
  el.classList.add('on');
}

// ── PROJECTS ── //
function renderProjects() {
  const list = document.getElementById('proj-list');
  list.innerHTML = '';
  projects.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'proj-card';
    d.innerHTML = `
      <div>
        <div class="proj-card-name">${p.name || '—'}</div>
        <div class="proj-card-sub">${(p.type||'').toUpperCase()} · ${p.cat||''} · ${p.year||''}</div>
      </div>
      <button class="btn btn-sm" onclick="editProj(${i})">Edit</button>`;
    list.appendChild(d);
  });
}

function editProj(i) {
  editIdx = i;
  const p = projects[i];
  document.getElementById('f-name').value = p.name || '';
  document.getElementById('f-type').value = p.type || 'interior';
  document.getElementById('f-cat').value = p.cat || '';
  document.getElementById('f-year').value = p.year || '';
  document.getElementById('f-size').value = p.size || '';
  document.getElementById('f-images').value = (p.images||[]).filter(Boolean).join('\n');
  document.getElementById('editor-title').textContent = 'Edit Project';
  document.getElementById('del-btn').style.display = 'inline-block';
  document.getElementById('editor').classList.add('on');
}

function newProject() {
  editIdx = -1;
  ['f-name','f-cat','f-year','f-size','f-images'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-type').value = 'interior';
  document.getElementById('editor-title').textContent = 'New Project';
  document.getElementById('del-btn').style.display = 'none';
  document.getElementById('upload-msg').textContent = '';
  document.getElementById('editor').classList.add('on');
}

function saveProj() {
  const imgs = document.getElementById('f-images').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const p = {
    name: document.getElementById('f-name').value,
    type: document.getElementById('f-type').value,
    cat:  document.getElementById('f-cat').value,
    year: document.getElementById('f-year').value,
    size: document.getElementById('f-size').value,
    images: imgs.length ? imgs : [''],
  };
  if (editIdx >= 0) projects[editIdx] = p;
  else projects.push(p);
  localStorage.setItem('zak_p', JSON.stringify(projects));
  renderProjects();
  closeEditor();
  toast('저장됐어요!');
}

function delProj() {
  if (!confirm('정말 삭제할까요?')) return;
  projects.splice(editIdx, 1);
  localStorage.setItem('zak_p', JSON.stringify(projects));
  renderProjects();
  closeEditor();
  toast('삭제됐어요!');
}

function closeEditor() {
  document.getElementById('editor').classList.remove('on');
  editIdx = -1;
}

// ── IMAGE UPLOAD ── //
async function uploadImgs(input) {
  if (!gh.token || !gh.owner || !gh.repo) {
    toast('Settings에서 GitHub 정보를 먼저 저장하세요!', true);
    return;
  }
  const files = Array.from(input.files);
  const msg = document.getElementById('upload-msg');
  msg.textContent = `업로드 중 (0/${files.length})...`;
  const urls = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      const b64 = await toBase64(file);
      const fname = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const res = await fetch(
        `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/images/${fname}`,
        {
          method: 'PUT',
          headers: {
            'Authorization': `token ${gh.token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message: `Upload: ${fname}`, content: b64 })
        }
      );
      if (res.ok) {
        urls.push(`https://raw.githubusercontent.com/${gh.owner}/${gh.repo}/main/images/${fname}`);
        msg.textContent = `업로드 중 (${i+1}/${files.length})...`;
      } else {
        const e = await res.json();
        toast(`업로드 실패: ${e.message}`, true);
      }
    } catch(e) {
      toast(`오류: ${e.message}`, true);
    }
  }
  if (urls.length) {
    const cur = document.getElementById('f-images').value.trim();
    document.getElementById('f-images').value = cur ? cur + '\n' + urls.join('\n') : urls.join('\n');
    msg.textContent = `✓ ${urls.length}개 완료!`;
    toast(`이미지 ${urls.length}개 업로드됐어요!`);
  }
  input.value = '';
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ── ABOUT ── //
function renderAbout() {
  document.getElementById('a-p1').value = about.p1 || '';
  document.getElementById('a-p2').value = about.p2 || '';
  document.getElementById('a-p3').value = about.p3 || '';
}

// ── CONTACT ── //
function renderContact() {
  document.getElementById('c-studio').value = contact.studio || '';
  document.getElementById('c-email').value = contact.email || '';
  document.getElementById('c-phone').value = contact.phone || '';
  document.getElementById('c-ig').value = contact.ig || '';
  document.getElementById('c-biz').value = contact.biz || '';
}

// ── GH SETTINGS ── //
function renderGH() {
  document.getElementById('s-token').value = gh.token || '';
  document.getElementById('s-owner').value = gh.owner || '';
  document.getElementById('s-repo').value = gh.repo || '';
  document.getElementById('s-path').value = gh.path || 'index.html';
  updateDot();
}

function saveGH() {
  const token = document.getElementById('s-token').value.trim();
  const owner = document.getElementById('s-owner').value.trim();
  const repo  = document.getElementById('s-repo').value.trim();
  const path  = document.getElementById('s-path').value.trim() || 'index.html';
  if (!token || !owner || !repo) {
    toast('토큰, 아이디, 레포 이름을 모두 입력하세요!', true);
    return;
  }
  gh = { token, owner, repo, path };
  localStorage.setItem('zak_g', JSON.stringify(gh));
  updateDot();
  toast('GitHub 설정 저장 완료! ✓');
}

function updateDot() {
  const dot = document.getElementById('gh-dot');
  const txt = document.getElementById('gh-txt');
  if (gh.token && gh.owner && gh.repo) {
    dot.className = 'dot green';
    txt.textContent = `연결됨: ${gh.owner}/${gh.repo}`;
  } else {
    dot.className = 'dot red';
    txt.textContent = '미연결 — 위 정보를 입력하고 Save Settings 클릭';
  }
}

// ── DEPLOY ── //
async function deploy() {
  // collect latest
  about = {
    p1: document.getElementById('a-p1').value,
    p2: document.getElementById('a-p2').value,
    p3: document.getElementById('a-p3').value,
  };
  contact = {
    studio: document.getElementById('c-studio').value,
    email:  document.getElementById('c-email').value,
    phone:  document.getElementById('c-phone').value,
    ig:     document.getElementById('c-ig').value,
    biz:    document.getElementById('c-biz').value,
  };
  localStorage.setItem('zak_a', JSON.stringify(about));
  localStorage.setItem('zak_c', JSON.stringify(contact));
  localStorage.setItem('zak_p', JSON.stringify(projects));

  if (!gh.token || !gh.owner || !gh.repo) {
    toast('Settings 탭에서 GitHub 정보를 먼저 저장하세요!', true);
    return;
  }

  const msg = document.getElementById('deploy-msg');
  msg.textContent = '배포 중...';

  try {
    const url = `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.path}`;
    const headers = {
      'Authorization': `token ${gh.token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    };

    const getRes = await fetch(url, { headers });
    if (!getRes.ok) {
      const e = await getRes.json();
      toast(`파일 읽기 실패: ${e.message}`, true);
      msg.textContent = '';
      return;
    }
    const getJson = await getRes.json();
    const sha = getJson.sha;
    const raw = decodeURIComponent(escape(atob(getJson.content.replace(/\s/g,''))));
    const patched = patchHTML(raw);

    const putRes = await fetch(url, {
      method: 'PUT',
      headers,
      body: JSON.stringify({
        message: 'Admin update ' + new Date().toLocaleString('ko-KR'),
        content: btoa(unescape(encodeURIComponent(patched))),
        sha,
      })
    });

    if (putRes.ok) {
      toast('배포 완료! 30초 후 사이트에 반영돼요 🎉');
      msg.textContent = '';
    } else {
      const e = await putRes.json();
      toast(`배포 실패: ${e.message}`, true);
      msg.textContent = '';
    }
  } catch(e) {
    toast(`오류: ${e.message}`, true);
    msg.textContent = '';
  }
}

function patchHTML(html) {
  // projects
  html = html.replace(/const PROJECTS = \[[\s\S]*?\];/, `const PROJECTS = ${JSON.stringify(projects, null, 2)};`);

  // about
  html = html.replace(
    /(<div class="home-body">)[\s\S]*?(<\/div>)/,
    `$1\n        <p>${about.p1}</p>\n        <p>${about.p2}</p>\n        <p>${about.p3}</p>\n      $2`
  );

  // contact
  html = html.replace(/(<span class="c-label">Studio<\/span><span class="c-val">)[^<]*(<\/span>)/, `$1${contact.studio}$2`);
  html = html.replace(/(<span class="c-label">Email<\/span><span class="c-val">)[^<]*(<\/span>)/, `$1${contact.email}$2`);
  html = html.replace(/(<span class="c-label">Phone<\/span><span class="c-val">)[^<]*(<\/span>)/, `$1${contact.phone}$2`);
  html = html.replace(/(<span class="c-label">New Business<\/span><span class="c-val">)[^<]*(<\/span>)/, `$1${contact.biz}$2`);
  html = html.replace(
    /(<span class="c-label">Instagram<\/span><span class="c-val">)[\s\S]*?(<\/span>)/,
    `$1<a href="https://instagram.com/${contact.ig.replace('@','')}" target="_blank" style="color:inherit;">${contact.ig}</a>$2`
  );

  return html;
}

// ── TOAST ── //
function toast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on' + (isErr ? ' red' : '');
  setTimeout(() => { t.className = 'toast'; }, 3500);
}
</script>
</body>
</html>
